<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="H.O.T-Jarvis logomark">
  <title>H.O.T-Jarvis</title>
  <!-- The aperture: a Reuleaux triangle (constant-width curved triangle,
       each edge an arc centered on the opposite vertex) with a circular eye
       punched from the center via fill-rule evenodd. One shape, one idea:
       an assistant that is always attentive. -->
  <defs>
    <linearGradient id="hj-mark" x1="16" y1="16" x2="84" y2="84" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fe7ff"/>
      <stop offset="1" stop-color="#2aa8e0"/>
    </linearGradient>
  </defs>
  <path fill="url(#hj-mark)" fill-rule="evenodd"
        d="M50 16 A58.89 58.89 0 0 1 79.44 67 A58.89 58.89 0 0 1 20.56 67 A58.89 58.89 0 0 1 50 16 Z
           M66 50 A16 16 0 1 0 34 50 A16 16 0 1 0 66 50 Z"/>
</svg>
