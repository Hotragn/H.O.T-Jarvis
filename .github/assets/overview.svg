<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" width="1280" height="420" role="img" aria-label="H.O.T-Jarvis overview: a living core connected to its four hero features">
  <title>H.O.T-Jarvis — overview</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060d17"/>
      <stop offset="1" stop-color="#04070d"/>
    </linearGradient>
    <linearGradient id="cy" x1="90" y1="90" x2="330" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fe7ff"/><stop offset="1" stop-color="#2aa8e0"/>
    </linearGradient>
    <radialGradient id="iris" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#7fe7ff"/><stop offset="55%" stop-color="#38c6f4"/><stop offset="100%" stop-color="#38c6f4" stop-opacity="0"/>
    </radialGradient>
    <style>
      @keyframes spin  { to { transform: rotate(360deg); } }
      @keyframes spinr { to { transform: rotate(-360deg); } }
      @keyframes breathe { 0%,100% { opacity:.45 } 50% { opacity:.95 } }
      @keyframes flow  { to { stroke-dashoffset: -60; } }
      @keyframes rise  { 0% { opacity:0; transform: translateY(10px) } 100% { opacity:1; transform:none } }
      .ticks { transform-origin: 210px 210px; animation: spin 26s linear infinite; }
      .arc2  { transform-origin: 210px 210px; animation: spinr 18s linear infinite; }
      .iris  { transform-origin: 210px 210px; animation: breathe 3.6s ease-in-out infinite; }
      .link  { stroke-dasharray: 6 8; animation: flow 2.4s linear infinite; }
      .pill  { opacity:0; animation: rise .8s cubic-bezier(.16,1,.3,1) forwards; }
      .p1 { animation-delay:.2s } .p2 { animation-delay:.4s } .p3 { animation-delay:.6s } .p4 { animation-delay:.8s }
      .lbl { font-family: 'Segoe UI', system-ui, sans-serif; fill:#d9e7f2; }
      .dim { fill:#7f93a8; }
      @media (prefers-reduced-motion: reduce) {
        .ticks,.arc2,.iris,.link,.pill { animation: none; }
        .pill { opacity:1; }
      }
    </style>
  </defs>

  <rect width="1280" height="420" rx="20" fill="url(#bg)"/>

  <!-- connections core -> pills -->
  <g fill="none" stroke="#38c6f4" stroke-width="1.6" opacity="0.5">
    <path class="link" d="M330 210 C 400 150, 440 120, 470 120"/>
    <path class="link" d="M330 210 C 430 200, 470 300, 560 300"/>
    <path class="link" d="M330 210 C 520 150, 760 120, 880 120"/>
    <path class="link" d="M330 210 C 520 250, 780 300, 890 300"/>
  </g>

  <!-- core -->
  <g>
    <g class="ticks">
      <g fill="none" stroke="url(#cy)">
        <!-- 24 ticks -->
        <g stroke-width="3">
          <line x1="210" y1="92" x2="210" y2="112"/>
          <line x1="210" y1="308" x2="210" y2="328"/>
          <line x1="92" y1="210" x2="112" y2="210"/>
          <line x1="308" y1="210" x2="328" y2="210"/>
        </g>
        <g stroke-width="1.6" opacity="0.6">
          <line x1="126" y1="126" x2="140" y2="140"/>
          <line x1="294" y1="126" x2="280" y2="140"/>
          <line x1="126" y1="294" x2="140" y2="280"/>
          <line x1="294" y1="294" x2="280" y2="280"/>
        </g>
      </g>
      <circle cx="210" cy="210" r="118" fill="none" stroke="#38c6f4" stroke-width="1.4" opacity="0.35" stroke-dasharray="200 60"/>
    </g>
    <g class="arc2">
      <circle cx="210" cy="210" r="96" fill="none" stroke="#56dfb4" stroke-width="2" opacity="0.6" stroke-dasharray="120 180"/>
    </g>
    <circle class="iris" cx="210" cy="210" r="70" fill="url(#iris)"/>
    <circle cx="210" cy="210" r="46" fill="none" stroke="#7fe7ff" stroke-width="2.5"/>
    <circle cx="210" cy="210" r="6" fill="#eaffff"/>
  </g>

  <!-- title -->
  <text x="470" y="150" class="lbl" font-size="52" font-weight="600" letter-spacing="2">H.O.T<tspan class="dim">-JARVIS</tspan></text>
  <text x="472" y="188" class="dim" font-family="'Cascadia Code',monospace" font-size="16" letter-spacing="3">LOCAL-FIRST · FREE FOREVER · OPEN SOURCE</text>

  <!-- feature pills -->
  <g class="pill p1"><rect x="470" y="96" width="270" height="48" rx="10" fill="#0d1826" stroke="#38c6f4" stroke-opacity="0.4"/><circle cx="498" cy="120" r="7" fill="#38c6f4"/><text x="518" y="126" class="lbl" font-size="17">Self-evolving skills</text></g>
  <g class="pill p2"><rect x="560" y="276" width="300" height="48" rx="10" fill="#0d1826" stroke="#38c6f4" stroke-opacity="0.4"/><circle cx="588" cy="300" r="7" fill="#56dfb4"/><text x="608" y="306" class="lbl" font-size="17">Reflective reasoning-memory</text></g>
  <g class="pill p3"><rect x="880" y="96" width="270" height="48" rx="10" fill="#0d1826" stroke="#38c6f4" stroke-opacity="0.4"/><circle cx="908" cy="120" r="7" fill="#38c6f4"/><text x="928" y="126" class="lbl" font-size="17">Calibrated confidence</text></g>
  <g class="pill p4"><rect x="890" y="276" width="270" height="48" rx="10" fill="#0d1826" stroke="#38c6f4" stroke-opacity="0.4"/><circle cx="918" cy="300" r="7" fill="#56dfb4"/><text x="938" y="306" class="lbl" font-size="17">Replay &amp; undo</text></g>
</svg>
