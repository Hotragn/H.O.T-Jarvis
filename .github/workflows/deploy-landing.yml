name: Deploy landing page to GitHub Pages

# Publishes the static landing/ site to GitHub Pages on every push to main
# that touches it. One-time setup: repo Settings → Pages → Build and deployment
# → Source = "GitHub Actions". Project page URL: https://hotragn.github.io/H.O.T-Jarvis/
# (the landing page uses only relative asset paths, so it works under that subpath).

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload landing/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing
      - id: deployment
        uses: actions/deploy-pages@v4
