# Netlify deploy for the docs site. Static Astro output.
[build]
  command = "npm run build"
  publish = "dist"

# Hashed build assets never change — cache them hard.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
