<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="H.O.T-Jarvis logomark">
  <title>H.O.T-Jarvis</title>
  <defs>
    <linearGradient id="hj-cyan" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7fe7ff"/>
      <stop offset="1" stop-color="#2aa8e0"/>
    </linearGradient>
  </defs>
  <!-- Aperture core: three arc segments with gaps = an open, listening focus.
       One segment (mint) buds a spark — the assistant growing a new skill. -->
  <g fill="none" stroke-linecap="round">
    <path d="M54 32 A22 22 0 0 1 32 54" stroke="url(#hj-cyan)" stroke-width="5.5"/>
    <path d="M21 51.05 A22 22 0 0 1 12.95 21" stroke="url(#hj-cyan)" stroke-width="5.5"/>
    <path d="M21 12.95 A22 22 0 0 1 51.05 21" stroke="#56dfb4" stroke-width="5.5"/>
    <!-- growth spark: a short radial tick leaving the mint arc -->
    <path d="M51.05 21 L58 16.6" stroke="#56dfb4" stroke-width="4"/>
  </g>
  <circle cx="32" cy="32" r="5" fill="url(#hj-cyan)"/>
</svg>
