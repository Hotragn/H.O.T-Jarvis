<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="A timeline of actions with one step reversing">
  <defs>
    <linearGradient id="un-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#081420"/>
      <stop offset="100%" stop-color="#04070d"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#un-bg)"/>
  <!-- spine -->
  <line x1="150" y1="90" x2="150" y2="510" stroke="#1b2a38" stroke-width="2"/>
  <g font-family="monospace" font-size="13" fill="#64788f">
    <!-- rows -->
    <g>
      <circle cx="150" cy="140" r="6" fill="#38c6f4"/>
      <text x="180" y="145">chat.user · "build me a skill"</text>
    </g>
    <g>
      <circle cx="150" cy="220" r="6" fill="#38c6f4"/>
      <text x="180" y="225">skill.authored · test passed</text>
    </g>
    <g>
      <circle cx="150" cy="300" r="6" fill="#56dfb4"/>
      <text x="180" y="305" fill="#56dfb4">note.saved · "roadmap"</text>
    </g>
    <!-- the reversing step -->
    <g>
      <circle cx="150" cy="380" r="9" fill="none" stroke="#f0b23e" stroke-width="2"/>
      <path d="M150 371 a9 9 0 1 1 -8 5" fill="none" stroke="#f0b23e" stroke-width="2"/>
      <path d="M141 372 l1 6 l6 -2" fill="none" stroke="#f0b23e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="180" y="385" fill="#f0b23e">undo · reverting last action…</text>
    </g>
    <g opacity="0.4">
      <circle cx="150" cy="460" r="6" fill="#64788f"/>
      <text x="180" y="465">chat.assistant · confidence 92%</text>
    </g>
  </g>
</svg>
